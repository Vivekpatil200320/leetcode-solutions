name: Update Progress Dashboard

# Regenerates the README progress dashboard whenever a solution changes.
on:
  push:
    branches: [main]
    paths:
      - "**/*.py"
      - "scripts/generate_progress.py"
      - ".github/workflows/update-progress.yml"
  workflow_dispatch: {}

# Allow the workflow to commit the regenerated README back to the repo.
permissions:
  contents: write

concurrency:
  group: update-progress
  cancel-in-progress: false

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate progress dashboard
        run: python3 scripts/generate_progress.py

      - name: Commit updated README (if changed)
        run: |
          if git diff --quiet -- README.md; then
            echo "README already up to date — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore(readme): auto-update progress dashboard [skip ci]"
          git push
